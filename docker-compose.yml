version: '3.8'
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "y"
      SA_PASSWORD: "123456" # Thay đổi mật khẩu này
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  app:
    build: . # Build dựa trên Dockerfile bạn đã có sẵn ở project
    ports:
      - "80:8080" # Map port 80 của VPS vào 8080 của app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://db:1433;databaseName=schoolmanagerxyz;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=123456
    depends_on:
      - db

volumes:
  sqlserver_data:
